# 算了算了直接把gcc/clang on win删了
name: Build main.cpp

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: ${{ matrix.os }} / ${{ matrix.compiler }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        compiler: [gcc, clang, msvc]
        exclude:
          # MSVC 只在 Windows 上运行
          - compiler: msvc
            os: ubuntu-latest
          - compiler: msvc
            os: macos-latest
          # GCC 和 Clang 不在 Windows 上运行
          - compiler: gcc
            os: windows-latest
          - compiler: clang
            os: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ---------- Linux 编译器 ----------
      - name: Install GCC (Linux)
        if: runner.os == 'Linux' && matrix.compiler == 'gcc'
        run: sudo apt-get update && sudo apt-get install -y g++

      - name: Install Clang (Linux)
        if: runner.os == 'Linux' && matrix.compiler == 'clang'
        run: sudo apt-get update && sudo apt-get install -y clang

      # ---------- macOS 编译器 ----------
      - name: Install GCC (macOS)
        if: runner.os == 'macOS' && matrix.compiler == 'gcc'
        run: brew install gcc

      # macOS 自带 clang，无需安装

      # ---------- Windows MSVC 环境 ----------
      - name: Set up MSVC
        if: runner.os == 'Windows' && matrix.compiler == 'msvc'
        uses: ilammy/msvc-dev-cmd@v1

      # ---------- 编译（Unix）----------
      - name: Compile with GCC/Clang (Unix)
        if: runner.os != 'Windows'
        run: |
          if [ "${{ matrix.compiler }}" = "gcc" ]; then
            CXX=g++
          else
            CXX=clang++
          fi
          $CXX -std=c++17 -o main main.cpp
        shell: bash

      # ---------- 编译（Windows MSVC）----------
      - name: Compile with MSVC (Windows)
        if: runner.os == 'Windows' && matrix.compiler == 'msvc'
        run: cl /std:c++17 /Fe:main.exe main.cpp
        shell: powershell

      # ---------- 列出编译产物（Windows 调试）----------
      - name: List generated files (Windows)
        if: runner.os == 'Windows'
        run: |
          Write-Host "Current directory: $(Get-Location)"
          Write-Host "Files:"
          Get-ChildItem
        shell: powershell

      # ---------- 运行程序（Unix）----------
      - name: Run executable (Unix)
        if: runner.os != 'Windows'
        run: ./main
        shell: bash

      # ---------- 运行程序（Windows）----------
      - name: Run executable (Windows)
        if: runner.os == 'Windows'
        run: .\main.exe
        shell: powershell

      # ---------- 上传可执行文件 ----------
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: main-${{ matrix.os }}-${{ matrix.compiler }}
          path: |
            main
            main.exe