# 算了算了直接把gcc/clang on win删了
name: Build main.cpp

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: ${{ matrix.os }} / ${{ matrix.compiler }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        compiler: [gcc, clang, msvc]
        exclude:
          # MSVC 只在 Windows 上运行
          - compiler: msvc
            os: ubuntu-latest
          - compiler: msvc
            os: macos-latest

    steps:
      - name: 验证代码
        uses: actions/checkout@v4

      # ---------- Linux 编译器 ----------
      - name: 安装 GCC (Linux)
        if: runner.os == 'Linux' && matrix.compiler == 'gcc'
        run: sudo apt-get update && sudo apt-get install -y g++

      - name: 安装 Clang (Linux)
        if: runner.os == 'Linux' && matrix.compiler == 'clang'
        run: sudo apt-get update && sudo apt-get install -y clang

      # ---------- macOS 编译器 ----------
      - name: 安装 GCC (macOS)
        if: runner.os == 'macOS' && matrix.compiler == 'gcc'
        run: brew install gcc

      # macOS 自带 clang，无需安装

      # ---------- Windows MSVC 环境 ----------
      - name: 配置 MSVC
        if: runner.os == 'Windows' && matrix.compiler == 'msvc'
        uses: ilammy/msvc-dev-cmd@v1

      # ---------- Windows GCC 环境 ----------
      - name: 配置 GCC (Windows)
        if: runner.os == 'Windows' && matrix.compiler == 'gcc'
        run: |
          winget install gcc
          refreshenv

      # ---------- Windows Clang 环境 ----------
      - name: 配置 Clang (Windows)
        if: runner.os == 'Windows' && matrix.compiler == 'clang'
        run: |
          winget install llvm
          refreshenv

      # ---------- 编译（Unix）----------
      - name: 使用 GCC/Clang 编译 (Unix)
        if: runner.os != 'Windows'
        run: |
          if [ "${{ matrix.compiler }}" = "gcc" ]; then
            CXX=g++
          else
            CXX=clang++
          fi
          $CXX -std=c++17 -o main main.cpp
        shell: bash

      # ---------- 编译（Windows MSVC）----------
      - name: 使用 MSVC 编译 (Windows)
        if: runner.os == 'Windows' && matrix.compiler == 'msvc'
        run: cl /std:c++17 /Fe:main.exe main.cpp
        shell: powershell

      # ---------- 编译（Windows GCC）----------
      - name: 使用 GCC 编译 (Windows)
        if: runner.os == 'Windows' && matrix.compiler == 'gcc'
        run: |
          g++ -std=c++17 -o main.exe main.cpp
        shell: powershell

      # ---------- 编译（Windows Clang）----------
      - name: 使用 Clang 编译 (Windows)
        if: runner.os == 'Windows' && matrix.compiler == 'clang'
        run: |
          clang++ -std=c++17 -o main.exe main.cpp
        shell: powershell

      # # ---------- 列出编译产物（Windows 调试）----------
      # - name: 列出编译产物 (Windows)
      #   if: runner.os == 'Windows'
      #   run: |
      #     Write-Host "当前目录: $(Get-Location)"
      #     Write-Host "文件:"
      #     Get-ChildItem
      #   shell: powershell

      # ---------- 运行程序（Unix）----------
      - name: 运行程序 (Unix)
        if: runner.os != 'Windows'
        run: ./main
        shell: bash

      # ---------- 运行程序（Windows）----------
      - name: 运行程序 (Windows)
        if: runner.os == 'Windows'
        run: .\main.exe
        shell: powershell

      # ---------- 上传可执行文件 ----------
      - name: 上传编译产物
        uses: actions/upload-artifact@v4
        with:
          name: main-${{ matrix.os }}-${{ matrix.compiler }}
          path: |
            main
            main.exe