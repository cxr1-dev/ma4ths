# 傻逼Windows，真tm受不了这个b系统，还有这个old cmd😡FUCK YOU WINDOWS!!!
name: Build main.cpp

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: ${{ matrix.os }} / ${{ matrix.compiler }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        compiler: [gcc, clang, msvc]
        exclude:
          - compiler: msvc
            os: ubuntu-latest
          - compiler: msvc
            os: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ---------- Linux 编译器 ----------
      - name: Install GCC (Linux)
        if: runner.os == 'Linux' && matrix.compiler == 'gcc'
        run: sudo apt-get update && sudo apt-get install -y g++

      - name: Install Clang (Linux)
        if: runner.os == 'Linux' && matrix.compiler == 'clang'
        run: sudo apt-get update && sudo apt-get install -y clang

      # ---------- macOS 编译器 ----------
      - name: Install GCC (macOS)
        if: runner.os == 'macOS' && matrix.compiler == 'gcc'
        run: brew install gcc

      # macOS 自带 clang，无需安装

      # ---------- Windows MSVC 环境 ----------
      - name: Set up MSVC
        if: runner.os == 'Windows' && matrix.compiler == 'msvc'
        uses: ilammy/msvc-dev-cmd@v1

      # ---------- 编译 ----------
      - name: Compile with GCC/Clang (Unix)
        if: runner.os != 'Windows'
        run: |
          if [ "${{ matrix.compiler }}" = "gcc" ]; then
            CXX=g++
          else
            CXX=clang++
          fi
          $CXX -o main main.cpp
        shell: bash

      - name: Compile with MSVC (Windows)
        if: runner.os == 'Windows' && matrix.compiler == 'msvc'
        run: cl /Fe:main.exe main.cpp
        shell: powershell   # 改用 PowerShell，更稳定

      # ---------- 验证可执行文件是否存在（Windows）----------
      - name: List files (Windows)
        if: runner.os == 'Windows'
        run: Get-ChildItem
        shell: powershell

      # ---------- 运行程序 ----------
      - name: Run executable (Unix)
        if: runner.os != 'Windows'
        run: ./main
        shell: bash

      - name: Run executable (Windows)
        if: runner.os == 'Windows'
        run: .\main.exe         # PowerShell 中执行
        shell: powershell

      # ---------- 上传可执行文件 ----------
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: main-${{ matrix.os }}-${{ matrix.compiler }}
          path: |
            main
            main.exe