# fix by deepseek
name: Build Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        compiler: [gcc, clang, msvc]
        exclude:
          - compiler: msvc
            os: ubuntu-latest
          - compiler: msvc
            os: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up compiler (Linux)
        if: runner.os == 'Linux'
        run: |
          if [[ "${{ matrix.compiler }}" == "gcc" ]]; then
            sudo apt-get update
            sudo apt-get install -y g++
          elif [[ "${{ matrix.compiler }}" == "clang" ]]; then
            sudo apt-get update
            sudo apt-get install -y clang
          fi
        shell: bash

      - name: Set up compiler (macOS)
        if: runner.os == 'macOS'
        run: |
          if [[ "${{ matrix.compiler }}" == "gcc" ]]; then
            brew install gcc
          elif [[ "${{ matrix.compiler }}" == "clang" ]]; then
            echo "Clang is preinstalled on macOS"
          fi
        shell: bash

      - name: Configure and Build
        run: |
          mkdir -p build
          cd build
          if [[ "${{ runner.os }}" == "Windows" && "${{ matrix.compiler }}" == "msvc" ]]; then
            cmake .. -G "Visual Studio 17 2022"
            cmake --build . --config Release
          else
            cmake .. -DCMAKE_CXX_COMPILER=${{ matrix.compiler }}
            cmake --build .
          fi
        shell: bash

      - name: List build artifacts
        run: ls -R build
        shell: bash